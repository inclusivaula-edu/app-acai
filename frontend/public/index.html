<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta name="description" content="Açaí Shop - Peça seu açaí online" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Açaí Shop" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <title>Açaí Shop 🫐</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overscroll-behavior-y: none; /* impede pull-to-refresh nativo no mobile */
      }
      #root { min-height: 100vh; }

      /* ── Admin header nav grid ─────────────────────────────────────────── */
      .admin-nav-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      @media (min-width: 640px) {
        .admin-nav-grid { grid-template-columns: repeat(6, 1fr); }
      }

      /* ── Menu header (cardápio público) ────────────────────────────────── */
      .menu-header-wrap {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .menu-header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      @media (max-width: 500px) {
        .menu-header-wrap { flex-wrap: wrap; }
        .menu-header-actions { width: 100%; justify-content: flex-end; }
      }

      /* ── Admin conteúdo ────────────────────────────────────────────────── */
      .admin-page-inner {
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px 16px;
      }
      @media (min-width: 768px) {
        .admin-page-inner { padding: 28px 24px; }
      }

      /* ── Cards / grids ─────────────────────────────────────────────────── */
      .product-form-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }
      @media (min-width: 540px) {
        .product-form-grid { grid-template-columns: repeat(2, 1fr); }
      }
      @media (min-width: 900px) {
        .product-form-grid { grid-template-columns: repeat(4, 1fr); }
      }

      /* ── Abas de categoria do cardápio ─────────────────────────────────── */
      .category-tabs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      @media (max-width: 540px) {
        .category-tabs {
          flex-wrap: wrap;
          overflow-x: visible;
        }
        .category-tabs button {
          flex: 1 1 calc(50% - 10px);
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
